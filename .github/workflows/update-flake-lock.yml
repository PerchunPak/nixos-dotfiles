name: update-flake-lock
on:
  workflow_dispatch:
  schedule:
    - cron: '43 */12 * * *' # https://crontab.guru/#43_*/12_*_*_*

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_SECRET_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          determinate: false

      - name: Check if nixpkgs got updated
        id: check
        continue-on-error: true
        run: |
          nix flake update nixpkgs-upstream
          ! git diff --exit-code

      - name: Update my fork
        uses: Wandalen/wretry.action@v3.8.0
        if: steps.check.outcome == 'success'
        with:
          command: |
            nix flake update gh-cherry-pick

            nixpkgs_rev=$(
              nix flake metadata --json \
                | jq -er '.locks.nodes."nixpkgs-upstream".locked.rev'
            )
            nix run .#gh-cherry-pick -- \
              --target PerchunPak/nixpkgs@patched \
              --first-hard-reset-to "NixOS/nixpkgs/$nixpkgs_rev" \
              PerchunPak/nixpkgs@zellij-plugins \
              PerchunPak/nixpkgs@wayle
          attempt_limit: 3
          attempt_delay: 10000
        env:
          GITHUB_TOKEN: ${{ secrets.FORK_UPDATE_TOKEN }}

      - run: git reset --hard HEAD

      - name: Update flake.lock
        if: steps.check.outcome == 'success'
        uses: DeterminateSystems/update-flake-lock@v28
        with:
          token: ${{ steps.generate-token.outputs.token }}
